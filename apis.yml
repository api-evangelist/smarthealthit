aid: smarthealthit
url: https://raw.githubusercontent.com/api-evangelist/smarthealthit/refs/heads/main/apis.yml
name: SMART Health IT
kind: organization
description: SMART Health IT is the open standards and open source project run by
  the Computational Health Informatics Program at Boston Children's Hospital and
  Harvard Medical School that defines SMART on FHIR - the OAuth 2.0-based SMART
  App Launch framework that lets patient-facing and clinician-facing apps plug
  into any EHR and read clinical records over FHIR. The project publishes the
  HL7 SMART App Launch and FHIR Bulk Data specifications, the SMART Health Cards
  and SMART Health Links verifiable clinical data frameworks, open source client
  libraries, and free public sandboxes - an open FHIR R4 server loaded with
  synthetic patient records, the SMART App Launcher for simulating EHR and
  patient portal launches, and a reference Bulk Data server for testing
  system-level export.
